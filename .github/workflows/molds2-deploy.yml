name: MOLDS2 Deploy

on:
  workflow_dispatch:
    inputs:
      branch:
        description: Git branch to deploy through Cloudflare Pages
        required: true
        default: main

jobs:
  trigger-pages-deployment:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_PAGES_PROJECT: molds2-site
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.18.3

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
          cache: pnpm

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Astro checks
        run: pnpm --dir apps/molds2 check

      - name: Build MOLDS2
        run: pnpm --dir apps/molds2 build

      - name: Trigger Cloudflare Pages deployment
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          DEPLOY_BRANCH: ${{ inputs.branch }}
        run: |
          set -euo pipefail

          response_file="$(mktemp)"

          curl -fsSL \
            -X POST \
            "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/pages/projects/${CLOUDFLARE_PAGES_PROJECT}/deployments" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{\"branch\":\"${DEPLOY_BRANCH}\",\"commit_dirty\":\"false\"}" \
            > "${response_file}"

          python - "${response_file}" <<'PY'
          import json
          import pathlib
          import sys

          payload = json.loads(pathlib.Path(sys.argv[1]).read_text())
          result = payload["result"]
          print(f"Triggered deployment: {result['id']}")
          print(f"Deployment URL: {result['url']}")
          PY

name: MOLDS2 Deploy

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "apps/molds2/**"
      - "apps/molds_old/app/api/rewritegen-articles/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - ".github/workflows/molds2-deploy.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_PAGES_PROJECT: molds2-site
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.18.3

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
          cache: pnpm

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Astro checks
        run: pnpm --dir apps/molds2 check

      - name: Mirror moldstud articles
        run: pnpm --dir apps/molds2 sync:moldstud

      - name: Build MOLDS2
        run: pnpm --dir apps/molds2 build

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: pnpm --dir apps/molds2 exec wrangler pages deploy dist --project-name=${{ env.CLOUDFLARE_PAGES_PROJECT }} --branch=main

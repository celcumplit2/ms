name: MOLDS2 Deploy

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.18.3

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
          cache: pnpm

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Ensure live Wrangler config exists
        run: |
          if [ ! -f apps/molds2/wrangler.jsonc ]; then
            echo "Missing apps/molds2/wrangler.jsonc. Copy wrangler.jsonc.example and fill live values before running deploy."
            exit 1
          fi

      - name: Build MOLDS2
        run: pnpm --dir apps/molds2 build

      - name: Deploy to Cloudflare
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --config apps/molds2/wrangler.jsonc

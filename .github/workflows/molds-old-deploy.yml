name: MOLDS_OLD Deploy

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "apps/molds_old/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - ".github/workflows/molds-old-deploy.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_STACK_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_STACK_PROJECT_ID }}
      NEXT_PUBLIC_STACK_PUBLISHABLE_CLIENT_KEY: ${{ secrets.NEXT_PUBLIC_STACK_PUBLISHABLE_CLIENT_KEY }}
      STACK_SECRET_SERVER_KEY: ${{ secrets.STACK_SECRET_SERVER_KEY }}
      MAILGUN_API_KEY: ${{ secrets.MAILGUN_API_KEY }}
      NEXT_PUBLIC_RECAPTCHA_SITE_KEY: ${{ secrets.NEXT_PUBLIC_RECAPTCHA_SITE_KEY }}
      RECAPTCHA_SECRET_KEY: ${{ secrets.RECAPTCHA_SECRET_KEY }}
      DATABASE_PORT: ${{ secrets.DATABASE_PORT }}
      DATABASE_HOST: ${{ secrets.DATABASE_HOST }}
      DATABASE_NAME: ${{ secrets.DATABASE_NAME }}
      DATABASE_USER: ${{ secrets.DATABASE_USER }}
      DATABASE_PASSWORD: ${{ secrets.DATABASE_PASSWORD }}
      DATABASE_ROOT_PASSWORD: ${{ secrets.DATABASE_ROOT_PASSWORD }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.18.3

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.16.0
          cache: pnpm

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Install production dependencies for molds_old
        run: pnpm --dir apps/molds_old run prod:install

      - name: Apply migrations
        run: pnpm --dir apps/molds_old run migrate:migrate

      - name: Build molds_old
        run: pnpm --dir apps/molds_old run prod:build

      - name: Upload Next artifact
        uses: actions/upload-artifact@v4
        with:
          name: molds-old-next-build
          path: apps/molds_old/.next
          include-hidden-files: true
          if-no-files-found: error
          retention-days: 1

      - name: Upload Cron artifact
        uses: actions/upload-artifact@v4
        with:
          name: molds-old-cron-build
          path: apps/molds_old/cron/.build
          include-hidden-files: true
          if-no-files-found: error
          retention-days: 1

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download Next artifact
        uses: actions/download-artifact@v4
        with:
          name: molds-old-next-build
          path: apps/molds_old/.next

      - name: Download Cron artifact
        uses: actions/download-artifact@v4
        with:
          name: molds-old-cron-build
          path: apps/molds_old/cron/.build

      - name: Pull latest code on production server and clear old build output
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            cd ${{ vars.DEPLOY_ROOT }}
            git pull
            pnpm install --frozen-lockfile
            for i in {1..3}; do rm -rf apps/molds_old/.next && break || sleep 5; done
            for i in {1..3}; do rm -rf apps/molds_old/cron/.build && break || sleep 5; done

      - name: Copy Next build files to production server
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT }}
          source: "apps/molds_old/.next"
          target: ${{ vars.DEPLOY_ROOT }}

      - name: Copy Cron build files to production server
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT }}
          source: "apps/molds_old/cron/.build"
          target: ${{ vars.DEPLOY_ROOT }}

      - name: Restart PM2 for molds_old
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            cd ${{ vars.DEPLOY_ROOT }}/apps/molds_old
            pm2 restart ecosystem.config.js
